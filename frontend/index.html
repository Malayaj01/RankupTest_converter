<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankUp Test - Question Paper Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="main-header">
            <div class="logo-container">
                <img src="logo.png" alt="RankUp Test Logo" class="app-logo">
                <div class="brand-text">
                    <h1>RankUp Test</h1>
                    <p>Professional Question Paper Generator</p>
                </div>
            </div>
        </header>

        <!-- Main Card -->
        <main class="glass-card">
            <div class="input-section">
                <label for="exam-name" class="floating-label">Exam Name</label>
                <input type="text" id="exam-name" placeholder="e.g. SI Pre 2026" required>
            </div>

            <div class="upload-area" id="drop-zone">
                <div class="upload-content">
                    <div class="icon-circle">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z"
                                stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M14 2V8H20" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M16 13H8" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M16 17H8" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M10 9H8" stroke="#4F46E5" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <h3>Upload Excel File</h3>
                    <p>Drag & drop or <span class="browse-link">browse</span></p>
                    <p class="file-hint">Supported format: .xlsx</p>
                </div>
                <input type="file" id="file-input" accept=".xlsx" hidden>
            </div>

            <div id="status-message" class="status"></div>
        </main>

        <footer>
            <p>&copy; 2026 RankUp Test. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
